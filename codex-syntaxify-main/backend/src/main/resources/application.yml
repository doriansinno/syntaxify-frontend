server:
  port: ${PORT:8080}

spring:
  application:
    name: syntaxify-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  timeout-ms: ${OPENAI_TIMEOUT_MS:45000}

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}
