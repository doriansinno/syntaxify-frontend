<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Syntaxify</title>
  <style>
    :root{
      --bg:#000;
      --fg:#c071c9;
    }
    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
    }

    /* Fade zur nächsten Seite */
    body.fade-out{
      opacity:0;
      transition: opacity .55s ease;
    }

    .screen{
      height:100%;
      padding:24px;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
    }

    .term{
      white-space:pre-wrap;
      font-size:18px;
      line-height:1.55;
    }

    .row{
      display:inline-flex;
      align-items:center;
      gap:10px;
    }

    input{
      background:transparent;
      border:none;
      outline:none;
      color:var(--fg);
      font:inherit;
      width:2ch;          
      caret-color: transparent;
      padding:0;
      margin:0;
    }

    .cursor{
      display:inline-block;
      width:10px;
      height:1.1em;
      background:var(--fg);
      animation: blink 1s steps(1) infinite;
      transform: translateY(2px);
    }
    @keyframes blink { 50%{opacity:0} }
  </style>
</head>
<body>
  <div class="screen">
    <div class="term" id="term">
      <div class="row">
        <span id="question">start? (y/n)</span>
        <input id="in" autocomplete="off" spellcheck="false" maxlength="1" />
        <span class="cursor" aria-hidden="true"></span>
      </div>
    </div>
  </div>

  <script>
    const NEXT = "startseite.html"; // <- hier deine Zielseite
    const term = document.getElementById("term");
    const input = document.getElementById("in");

    input.focus();
    document.addEventListener("click", () => input.focus());

    function lock(v){ input.disabled = v; if(!v) input.focus(); }

    function addLine(text){
      const div = document.createElement("div");
      div.textContent = text;
      term.insertBefore(div, term.lastElementChild); // vor Eingabezeile
      window.scrollTo(0, document.body.scrollHeight);
    }

    async function typeLine(text, speed=22){
      addLine(""); // leere Zeile, die wir füllen
      const line = term.children[term.children.length - 2]; // die zuletzt eingefügte Zeile
      for(let i=0;i<text.length;i++){
        line.textContent += text[i];
        await new Promise(r => setTimeout(r, speed));
      }
    }

    function fadeTo(url){
      lock(true);
      document.body.classList.add("fade-out");
      setTimeout(() => window.location.replace(url), 560);
    }

  async function runYes() {
  lock(true);

  const sleep = (ms) => new Promise(r => setTimeout(r, ms));
  const lines = [
    ">>> Boot sequence initiated",
    "loading kernel...",
    "kernel loaded",
    "mounting /dev...",
    "mounting /sys...",
    "mounting /proc...",
    "initializing memory manager...",
    "allocating buffers...",
    "buffers ready",
    "starting cpu threads...",
    "thread #1 online",
    "thread #2 online",
    "thread #3 online",
    "thread #4 online",
    "checking hardware...",
    "gpu detected",
    "audio device detected",
    "network adapter detected",
    "initializing network stack...",
    "dhcp request sent",
    "ip assigned",
    "establishing secure tunnel...",
    "encryption enabled",
    "loading security modules...",
    "firewall active",
    "checking file system...",
    "filesystem clean",
    "loading drivers...",
    "driver: keyboard OK",
    "driver: mouse OK",
    "driver: display OK",
    "driver: storage OK",
    "initializing services...",
    "service auth started",
    "service db started",
    "service cache started",
    "service api started",
    "service ui started",
    "syncing configuration...",
    "applying patches...",
    "patch 1 applied",
    "patch 2 applied",
    "patch 3 applied",
    "optimizing performance...",
    "warming up runtime...",
    "compiling shaders...",
    "linking modules...",
    "verifying integrity...",
    "final checks...",
    "system stable",
    ">>> READY"
  ];

  // TURBO MODE 🚀
  for (let i = 0; i < lines.length; i++) {
    typeLine(lines[i], 2); 
    await sleep(10);      
  }

  await sleep(150);
  fadeTo(NEXT);
  }

    async function runNo() {
    lock(true);
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

      const asciiLines = [
            "⠀⠀⠀⠀⠀⠀⠀⠀⣀⡀⠀⠀⠀⠀⠀⠀⠀⠀⠀ ⣀⡀⠀⠀⠀⠀",
            "⠀⠀⠀⠀⣠⣴⡿⠋⠁⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠉⠻⣷⣤⡀⠀",
            "⠀⠀⢀⣾⡟⡍⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀ ⠐⡙⣿⡄",
            "⠀⠀⣸⣿⠃⡇⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀  ⠇⣹⣿",
            "⠀⠀⣿⣿⡆⢚⢄⣀⣠⠤⠒⠈⠁⠀⠀⠈⠉⠐⠢⢄⡀⣀⢞⠀⣾⣿",
            "⠀⠀⠸⣿⣿⣅⠄⠙⡇⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⡟⠑⣄⣽⣿⡟",
            "⠀⠀⠀⠘⢿⣿⣟⡾⠁⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠱⣾⣿⣿⠏⠀",
            "⠀⠀⠀⠀⣸⠉⠁⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠈⡉⢻⠀⠀",
            "⠀⠀⠀⠀⢿⠀⢃⡀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⣰⠁⢸⠀⠀",
            "⠀⠀⠀⠀⢸⢰⡿⢘⣦⣤⣀⠑⢦⡀⠀⣠⠖⣁⣤⣴⡊⢸⡇⠀⠀",
            "⠀⠀⠀⠀⠀⠾⡅⣿⣿⣿⣿⣿⠌⠁⠀⠁⢺⣿⣿⣿⣿⠆⣇⠀⠀",
            "⠀⠀⠀⠀⠀⢀⠂⠘⢿⣿⣿⡿⠀⣰⣦⠀⠸⣿⣿⡿⠋⠈⢀⠀⠀⠀",
            "⠀⠀⠀⠀⠀⢠⠀⠀⠀⠀⠀⠀⢠⣿⢻⣆⠀⠀⠀⠀⠀⠀  ⣸⠀⠀⠀",
            "⠀⠀⠀⠀⠀⠈⠓⠶⣶⣦⠤⠀⠘⠋⠘⠋⠀ ⠠⣴⣶⡶⠞⠃⠀⠀⠀",
            "⠀⠀⠀⠀⠀⠀⠀ ⣿ ⢹⣷⠦⢀⠤⡤⡆⡤⣶⣿ ⢸⠇⠀⠀⠀⠀⠀",
            "⠀⠀⠀⠀⠀⠀⠀ ⢰⡀⠘⢯⣳⢶⠦⣧⢷⢗⣫⠇⡸⠀⠀⠀⠀⠀",
            "⠀⠀⠀⠀⠀⠀⠀⠀ ⠑⢤⡀⠈⠋⠛⠛⠋⠉ ⡠⠒⠁⠀⠀⠀⠀⠀",
            "⠀⠀⠀⠀⠀⠀⠀⠀⠀ ⠀⠹⢦⠀⢀⣀⠀⣠⠞⠁⠀⠀⠀⠀⠀⠀⠀",
            "⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀ ⠀⠀⠈⠉⠉⠉⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀"
       ];

        for (let i = 0; i < asciiLines.length; i++) {
            await typeLine(asciiLines[i], 1);
        }

        await typeLine("      You don't have a choice...  ", 100);

        // Nach der Animation weiterleiten
        fadeTo(NEXT);
    }

    input.addEventListener("keydown", async (e) => {
      if(e.key !== "Enter") return;

      const v = (input.value || "").trim().toLowerCase();
      addLine("> " + v);

      if(v === "y") return runYes();
      if(v === "n") return runNo();

      // ungültig: ruhig bleiben, sofort zurück
      await typeLine("y oder n.", 18);
      input.value = "";
      lock(false);
    });

    // Optional: direkt tippen ohne Enter (wenn du willst)
    // input.addEventListener("input", () => input.value = input.value.replace(/[^ynYN]/g,""));
  </script>
</body>
</html>
